name: Error en la app
description: Informa de un fallo o comportamiento incorrecto
title: "[Error]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Si la app te deja hacerlo, pulsa antes el botón `Soporte` y adjunta aquí el ZIP generado.
  - type: textarea
    id: what_happened
    attributes:
      label: Qué ha pasado
      description: Explica el problema con tus palabras
      placeholder: "He hecho..., y después ha pasado..."
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Qué estabas haciendo
      description: Escribe brevemente qué paso estabas intentando completar
      placeholder: "Estaba en la pantalla de..., había pulsado..."
    validations:
      required: true
  - type: input
    id: app_version
    attributes:
      label: Versión de la app
      description: Si la sabes, escríbela aquí
      placeholder: "Ejemplo: v1.0"
    validations:
      required: false
  - type: textarea
    id: support_bundle
    attributes:
      label: ZIP de soporte
      description: Arrastra aquí el ZIP generado por la app, si lo tienes
      placeholder: "Adjunta aquí el archivo support_bundle_...zip"
    validations:
      required: false
