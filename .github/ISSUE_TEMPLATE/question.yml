name: Consulta o ayuda
description: Haz una pregunta sobre instalación, uso o funcionamiento
title: "[Consulta]: "
labels:
  - question
body:
  - type: textarea
    id: question
    attributes:
      label: Tu consulta
      description: Explica tu duda con el mayor detalle posible
      placeholder: "Quiero saber cómo..."
    validations:
      required: true
  - type: dropdown
    id: topic
    attributes:
      label: Tema
      options:
        - Instalación
        - Uso general
        - Audio o micrófono
        - Evaluación
        - Exportación de PDF
        - Otro
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Contexto adicional
      description: Añade capturas, mensajes o detalles que ayuden a entender la consulta
    validations:
      required: false
