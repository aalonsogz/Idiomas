name: Consulta o ayuda
description: Haz una pregunta sobre instalación, uso o funcionamiento
title: "[Consulta]: "
labels:
  - question
body:
  - type: textarea
    id: question
    attributes:
      label: Tu consulta
      description: Explica tu duda de la forma más clara posible
      placeholder: "Quiero saber cómo..."
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Contexto adicional
      description: Si quieres, añade aquí más detalles o una captura
    validations:
      required: false
